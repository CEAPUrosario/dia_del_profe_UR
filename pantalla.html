<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablero en Vivo — Día del Profesor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    /* Layout fijo para proyección — sin scroll */
    html, body { 
      height: 100%; 
      overflow: hidden; 
      margin: 0; 
      background-color: #1a1a1a; /* Color de fondo oscuro para que resalten los post-its */
      color: white;
      font-family: 'DM Sans', sans-serif;
    }

    .pantalla-body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .pantalla-header {
      flex-shrink: 0;
      padding: 16px 24px 8px;
    }

    .pantalla-logo { height: 50px; margin-bottom: 8px; }
    .pantalla-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0; }
    .pantalla-sub { font-size: 1.2rem; opacity: 0.8; margin: 4px 0 0; }

    .pantalla-board {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap; /* Columnas automáticas */
      align-content: flex-start;
      gap: 20px;
      padding: 20px 28px;
      flex: 1;
      overflow: hidden;
    }

    .postit {
      width: 280px; 
      padding: 18px;
      box-sizing: border-box;
      border-radius: 2px;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
      display: inline-block;
      color: #333;
      transition: opacity 0.5s;
    }

    .postit-teacher { font-weight: bold; font-size: 0.9rem; text-transform: uppercase; opacity: 0.7; }
    
    .postit-msg {
      font-family: 'Caveat', cursive;
      font-size: 24px;
      line-height: 1.2;
      margin: 10px 0;
      word-wrap: break-word;
    }

    .postit-footer {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 500;
      opacity: 0.6;
    }

    .pantalla-footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 28px 20px;
    }

    /* Barra de progreso */
    .progress-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin: 0 20px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fde87c;
    }

    #page-indicator { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* Clase para medir */
    .offscreen {
      position: absolute;
      visibility: hidden;
      z-index: -1000;
      top: 0;
    }
  </style>
</head>
<body class="pantalla-body">

  <div class="pantalla-header">
    <img src="https://github.com/CEAPUrosario/boletin_ceap/blob/main/img/UROSARIO_Logo_Horizontal_blanco%20sobre%20transp.png?raw=true"
         alt="Universidad del Rosario" class="pantalla-logo">
    <h1 class="pantalla-title">Feliz Día, <em>Profe</em></h1>
    <p class="pantalla-sub">Mensajes de tus estudiantes ✨</p>
  </div>

  <div class="pantalla-board" id="pantalla-board">
    <div class="pantalla-empty">Cargando mensajes… ✦</div>
  </div>

  <div class="pantalla-footer">
    <div class="pantalla-badge">
      <span id="msg-count">0</span> mensajes recibidos
    </div>
    <div class="progress-track">
      <div id="progress-bar"></div>
    </div>
    <div id="page-indicator"></div>
  </div>

  <script type="module" src="pantalla.js"></script>
</body>
</html>
