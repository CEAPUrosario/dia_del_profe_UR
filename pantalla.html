<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablero en Vivo — Día del Profesor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Layout fijo para proyección — sin scroll ── */
    html, body { height: 100%; overflow: hidden; margin: 0; }

    .pantalla-body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1a1025;
    }

    /* ── HEADER ── */
    .pantalla-header {
      flex-shrink: 0;
      padding: 14px 28px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* Logo centrado y sin deformación */
    .pantalla-logo {
      display: block;
      height: 52px;
      width: auto;
      object-fit: contain;
      margin-bottom: 6px;
    }

    /* ── BUSCADOR ── */
    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-wrapper svg {
      position: absolute;
      left: 12px;
      opacity: 0.45;
      pointer-events: none;
    }

    #search-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 8px 18px 8px 38px;
      outline: none;
      width: 220px;
      transition: background 0.2s, border-color 0.2s, width 0.3s;
    }

    #search-input::placeholder { color: rgba(255,255,255,0.35); }

    #search-input:focus {
      background: rgba(255,255,255,0.13);
      border-color: #fde87c;
      width: 280px;
    }

    /* ── BOARD ── */
    .pantalla-board {
      flex: 1;
      overflow: hidden;
      padding: 8px 28px 0;
      transition: opacity 0.45s ease;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      grid-auto-rows: auto;
      gap: 16px;
      align-content: start;
    }

    /* Post-its de altura dinámica */
    .pantalla-board .postit {
      margin-bottom: 0;
      break-inside: avoid;
      display: flex;
      flex-direction: column;
      height: auto;
      min-height: 140px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .pantalla-board .postit:hover {
      transform: scale(1.04) rotate(0deg) !important;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35) !important;
      z-index: 10;
    }

    .pantalla-board .postit .postit-msg {
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 8;
      -webkit-box-orient: vertical;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* ── FOOTER ── */
    .pantalla-footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 28px 12px;
      gap: 12px;
    }

    /* Flechas de navegación */
    .nav-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: rgba(253,232,124,0.18);
      border-color: #fde87c;
      transform: scale(1.08);
    }

    .nav-btn:active { transform: scale(0.95); }
    .nav-btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

    /* Barra de progreso */
    .progress-track {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fde87c;
      border-radius: 2px;
    }

    #page-indicator {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── MODAL post-it expandido ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 20, 0.75);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      position: relative;
      max-width: 520px;
      width: 90%;
      border-radius: 4px;
      padding: 36px 36px 28px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 2px 0 rgba(0,0,0,0.15) inset;
      transform: scale(0.88) rotate(-1deg);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      font-family: 'Caveat', cursive;
    }

    .modal-overlay.active .modal-card {
      transform: scale(1) rotate(0deg);
    }

    .modal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 48px; height: 22px;
      background: rgba(0,0,0,0.18);
      border-radius: 0 0 6px 6px;
    }

    .modal-teacher {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.55;
      margin-bottom: 12px;
      font-family: 'DM Sans', sans-serif;
    }

    .modal-msg {
      font-size: 26px;
      line-height: 1.45;
      color: rgba(0,0,0,0.82);
      margin-bottom: 20px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-from {
      font-size: 15px;
      opacity: 0.55;
      font-family: 'DM Sans', sans-serif;
    }

    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      background: rgba(0,0,0,0.12);
      border: none;
      border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(0,0,0,0.5);
      font-size: 16px;
      transition: background 0.2s, transform 0.15s;
    }

    .modal-close:hover { background: rgba(0,0,0,0.22); transform: scale(1.1); }

    /* El post-it del board se vuelve clickeable */
    .pantalla-board .postit {
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .pantalla-board .postit:hover {
      transform: scale(1.04) rotate(0deg) !important;
      box-shadow: 0 12px 32px rgba(0,0,0,0.35) !important;
      z-index: 10;
    }

    /* ── Estado vacío ── */
    .pantalla-empty {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: rgba(255,255,255,0.3);
      font-family: 'Caveat', cursive;
      font-size: 24px;
    }
  </style>
</head>
<body class="pantalla-body">

  <!-- HEADER -->
  <div class="pantalla-header">
    <div class="header-left">
      <img src="https://github.com/CEAPUrosario/boletin_ceap/blob/main/img/UROSARIO_Logo_Horizontal_blanco%20sobre%20transp.png?raw=true"
           alt="Universidad del Rosario" class="pantalla-logo">
      <h1 class="pantalla-title">Feliz Día, <em>Profe</em></h1>
      <p class="pantalla-sub">Mensajes de tus estudiantes ✨</p>
    </div>

    <!-- BUSCADOR -->
    <div class="search-wrapper">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Buscar profe o estudiante…" autocomplete="off">
    </div>
  </div>

  <!-- BOARD -->
  <div class="pantalla-board" id="pantalla-board">
    <div class="pantalla-empty">Cargando mensajes… ✦</div>
  </div>

  <!-- FOOTER -->
  <div class="pantalla-footer">
    <div class="pantalla-badge">
      <span id="msg-count">0</span> mensajes en el tablero
    </div>

    <!-- Flecha anterior -->
    <button class="nav-btn" id="btn-prev" title="Anterior" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="progress-track">
      <div id="progress-bar"></div>
    </div>

    <!-- Flecha siguiente -->
    <button class="nav-btn" id="btn-next" title="Siguiente" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <div id="page-indicator"></div>
  </div>

  <!-- MODAL post-it expandido -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-card" id="modal-card">
      <button class="modal-close" id="modal-close" title="Cerrar">✕</button>
      <div class="modal-teacher" id="modal-teacher"></div>
      <div class="modal-msg"    id="modal-msg"></div>
      <div class="modal-from"   id="modal-from"></div>
    </div>
  </div>

  <script type="module" src="pantalla.js"></script>
</body>
</html>
