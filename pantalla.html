<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tablero en Vivo — Día del Profesor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>

    /* Layout fijo para proyección — sin scroll */

    html, body { height: 100%; overflow: hidden; }



    .pantalla-body {

      display: flex;

      flex-direction: column;

      height: 100vh;

    }

    .pantalla-header {

      flex-shrink: 0;

      padding: 16px 24px 8px;

    }

    .pantalla-board {

      flex: 1;

      overflow: hidden;       /* nunca hace scroll */

      padding: 8px 28px 0;

      transition: opacity 0.5s;

      /* grid automático que llena el espacio disponible */

      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));

      grid-auto-rows: minmax(160px, 1fr);

      gap: 16px;

      align-content: start;

    }

    .pantalla-board .postit {

      margin-bottom: 0;   /* el gap del grid maneja el espacio */

    }

    .pantalla-footer {

      flex-shrink: 0;

      display: flex;

      align-items: center;

      justify-content: space-between;

      padding: 6px 28px 10px;

    }

    /* Barra de progreso */

    .progress-track {

      flex: 1;

      height: 3px;

      background: rgba(255,255,255,0.1);

      border-radius: 2px;

      margin: 0 16px;

      overflow: hidden;

    }

    #progress-bar {

      height: 100%;

      width: 0%;

      background: #fde87c;

      border-radius: 2px;

    }

    #page-indicator {

      font-size: 12px;

      color: rgba(255,255,255,0.3);

      white-space: nowrap;

    }

  </style>

</head>

<body class="pantalla-body">



  <div class="pantalla-header">

    <img src="https://github.com/CEAPUrosario/boletin_ceap/blob/main/img/UROSARIO_Logo_Horizontal_blanco%20sobre%20transp.png?raw=true"

         alt="Universidad del Rosario" class="pantalla-logo">

    <h1 class="pantalla-title">Feliz Día, <em>Profe</em></h1>

    <p class="pantalla-sub">Mensajes de tus estudiantes ✨</p>

  </div>



  <div class="pantalla-board" id="pantalla-board">

    <div class="pantalla-empty">Cargando mensajes… ✦</div>

  </div>



  <div class="pantalla-footer">

    <div class="pantalla-badge">

      <span id="msg-count">0</span> mensajes en el tablero

    </div>

    <div class="progress-track">

      <div id="progress-bar"></div>

    </div>

    <div id="page-indicator"></div>

  </div>



  <script type="module" src="pantalla.js"></script>

</body>

</html>
